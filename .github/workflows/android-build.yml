name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Verify APK is a real, valid package
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK"
          unzip -l "$APK" | grep -q AndroidManifest.xml
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          "${BUILD_TOOLS_DIR}aapt" dump badging "$APK" | tee apk-info.txt
          grep -q "^package:" apk-info.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Matumaini ${{ github.ref_name }}

            **This APK is debug-signed.** It is intended for internal testing and development.
            A release-signed APK requires configuring a release keystore.

            Built with Flutter 3.44.5 stable.
            Universal APK (all ABIs).
          generateReleaseNotes: true
