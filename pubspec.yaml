name: matumaini
description: Seventh-day Adventist Hymnal app - Every hymn. Every language. Every worship.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  drift: 2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  rive: ^0.13.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.5
  equatable: ^2.0.5
  intl: ^0.19.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: 2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/midi/
    - assets/fonts/
    - assets/rive/
    - assets/images/